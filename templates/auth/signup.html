{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
 
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card ems-card card p-4">
 
    <div class="text-center mb-4">
      <i class="bi bi-person-plus fs-1 text-primary"></i>
      <h3 class="mt-2 fw-bold">Create an account</h3>
      <p class="text-muted small">Join EMS to register for events</p>
    </div>
 
    <form method="POST" action="{{ url_for('auth.signup') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="e.g., John Doe" required>
      </div>

 
      {# Email #}
      <div class="mb-3">
        <label class="form-label fw-semibold">Email address</label>
        <input type="email" name="email" class="form-control"
               placeholder="you@example.com" required autofocus
               value="{{ request.form.get('email', '') }}">
      </div>
 
      {# Password #}
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="Min. 6 characters" required>
        <div class="form-text">At least 6 characters.</div>
      </div>
 
      {# Role #}
      <div class="mb-4">
        <label class="form-label fw-semibold">I am signing up as</label>
        <select name="role" class="form-select">
          <option value="attendee">Attendee — I want to attend events</option>
          <option value="organizer">Organizer — I want to create events</option>
          <option value="sponsor">Sponsor</option>
        </select>
      </div>
 
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="bi bi-person-check me-2"></i>Create Account
        </button>
      </div>
    </form>
 
    <p class="text-center text-muted small mb-0">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold">Login</a>
    </p>
  </div>
</div>
{% endblock %}
