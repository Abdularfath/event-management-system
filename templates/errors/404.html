{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 py-5">
            <h1 class="display-1 fw-bold text-primary mb-0">404</h1>
            <h2 class="mb-4">Oops! Page not found.</h2>
            <p class="text-muted mb-5">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
           <a href="{{ url_for('public.index') }}" class="btn btn-primary px-4 py-2">
                <i class="bi bi-house-door me-2"></i>Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
