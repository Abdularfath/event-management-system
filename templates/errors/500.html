{% extends 'base.html' %}
{% block title %}Server Error{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 py-5">
            <h1 class="display-1 fw-bold text-danger mb-0">500</h1>
            <h2 class="mb-4">Internal Server Error</h2>
            <p class="text-muted mb-5">Something went wrong on our end. Our team has been notified. Please try again later.</p>
            <a href="{{ url_for('public.index') }}" class="btn btn-primary px-4 py-2">
                <i class="bi bi-house-door me-2"></i>Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
