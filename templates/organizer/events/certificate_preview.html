{% extends 'base.html' %}
{% block title %}Certificate Preview{% endblock %}

{% block content %}
<div class="container py-4">
  <h4 class="fw-bold mb-3"><i class="bi bi-eye me-2 text-primary"></i>Certificate Preview — {{ attendee_name }}</h4>

  <div class="ems-card card p-3 mb-3">
    <iframe src="{{ url_for('events.certificate_raw_pdf', event_id=event_id, reg_id=reg_id) }}"
            style="width:100%;height:500px;border:1px solid #dee2e6;border-radius:6px;"></iframe>
  </div>

  <form method="POST" action="{{ url_for('events.send_certificate', event_id=event_id, reg_id=reg_id) }}"
        onsubmit="return confirm('Send this certificate to {{ attendee_name }}\'s email now?')">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="d-flex gap-2">
      <a href="{{ url_for('events.event_attendees', event_id=event_id) }}" class="btn btn-outline-secondary flex-fill">
        Cancel
      </a>
      <button type="submit" class="btn btn-primary flex-fill">
        <i class="bi bi-send me-1"></i>Proceed — Email to Attendee
      </button>
    </div>
  </form>
</div>
{% endblock %}
