{% extends 'base.html' %}
{% block title %}Scanner - {{ event.name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('events.list_events') }}">My Events</a></li>
            <li class="breadcrumb-item active">Scanner</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 text-center">
            <h2 class="fw-bold mb-2"><i class="bi bi-qr-code-scan text-primary me-2"></i>Check-in Scanner</h2>
            <p class="text-muted mb-4">Scanning tickets for <strong>{{ event.name }}</strong></p>

            <div class="card shadow border-0 overflow-hidden mb-4">
                <div class="card-body p-0">
                    <!-- The camera feed will appear inside this div -->
                    <div id="reader" width="100%"></div>
                </div>
            </div>

            <!-- This alert will show the scan result -->
            <div id="scan-result" class="alert d-none" role="alert"></div>
            
            <a href="{{ url_for('events.list_events') }}" class="btn btn-outline-secondary mt-3">Exit Scanner</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Import the HTML5 QR Code Scanner Library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const resultDiv = document.getElementById('scan-result');
        let isScanning = true;

        // Initialize the scanner
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { fps: 10, qrbox: {width: 250, height: 250} },
            /* verbose= */ false
        );

        // What happens when a QR code is successfully read
        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return; // Prevent multiple rapid scans
            isScanning = false;
            
            // Pause the scanner visually
            html5QrcodeScanner.pause();

            // Display the result locally (Tomorrow we will send this to the backend!)
            resultDiv.className = "alert alert-info mt-3";
            resultDiv.innerHTML = `<strong>Scanned Data:</strong> <br> <span class="small text-break">${decodedText}</span> <br><br> <button class="btn btn-sm btn-primary mt-2" onclick="resumeScan()">Scan Next Ticket</button>`;
            
            // Play a beep sound
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
            audio.play().catch(e => console.log("Audio play blocked by browser"));
        }

        // What happens on an error (happens constantly while looking for a code, so we ignore it)
        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning
        }

        // Start rendering the camera
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // Make the resume function available globally
        window.resumeScan = function() {
            resultDiv.className = "alert d-none";
            isScanning = true;
            html5QrcodeScanner.resume();
        };
    });
</script>
{% endblock %}
