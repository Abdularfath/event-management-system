{% extends 'base.html' %}
{% block title %}Add Session{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 800px;">
    <h3 class="fw-bold mb-4">Add New Session</h3>
    
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Session Title *</label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Description *</label>
                    <textarea name="description" class="form-control" rows="3" required></textarea>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Date *</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Start Time *</label>
                        <input type="time" name="start_time" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">End Time *</label>
                        <input type="time" name="end_time" class="form-control" required>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Track / Room (Optional)</label>
                        <input type="text" name="track" class="form-control" placeholder="e.g., Main Stage">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Live Stream URL (Optional)</label>
                        <input type="url" name="stream_url" class="form-control" placeholder="https://zoom.us/j/123...">
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('sessions.list_sessions', event_id=event_id) }}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Session</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
