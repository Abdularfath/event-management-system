{% extends 'base.html' %}
{% block title %}Add Speaker{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 600px;">
    <h3 class="fw-bold mb-4">Add New Speaker</h3>
    
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <!-- ENCTYPE IS REQUIRED FOR FILE UPLOADS -->
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Company / Job Title *</label>
                    <input type="text" name="company" class="form-control" placeholder="e.g., CEO at TechCorp" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Short Bio *</label>
                    <textarea name="bio" class="form-control" rows="3" required></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Profile Photo</label>
                    <input type="file" name="image" class="form-control" accept="image/png, image/jpeg, image/jpg">
                    <div class="form-text">Upload a picture. We will automatically crop it to focus on the face!</div>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('speakers.list_speakers') }}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Speaker</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
